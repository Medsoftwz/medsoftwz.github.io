/* =============================
   HULPFUNCTIES
============================= */

function getLevel(code) {
    return code.split(".").length;
}

function parseCode(code) {
    return code.replace("D", "")
        .split(/[_\.]/)
        .map(n => parseInt(n, 10));
}

function sortCodes(a, b) {
    const pa = parseCode(a.code);
    const pb = parseCode(b.code);

    for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
        const da = pa[i] ?? 0;
        const db = pb[i] ?? 0;
        if (da !== db) return da - db;
    }
    return 0;
}

============================= */

function buildTree(data) {
    const lookup = {};
    const root = [];

    data.sort(sortCodes);

    data.forEach(item => {
        lookup[item.code] = { ...item, children: [] };
    });

    data.forEach(item => {
        const parentCode = item.code.includes(".")
            ? item.code.split(".").slice(0, -1).join(".")
            : null;

        if (parentCode && lookup[parentCode]) {
            lookup[parentCode].children.push(lookup[item.code]);
        } else {
            root.push(lookup[item.code]);
        }
    });

    return root;
}

function renderTree(nodes) {
    let html = "<ul>";

    nodes.forEach(node => {
        const hasChildren = node.children.length > 0;
        const level = getLevel(node.code);

html += `
<li class="${hasChildren ? "collapsed has-children" : ""}">
    <div class="node level-${level}" id="node-${node.code}">
        <span class="arrow"></span>
        <span class="label">${node.code} – ${node.terms[0]}</span>
    </div>
`;

        if (hasChildren) {
            html += renderTree(node.children);
        }

        html += "</li>";
    });

    html += "</ul>";
    return html;
}
/* =============================
   INTERACTIE
============================= */

document.getElementById("tree").addEventListener("click", function(e) {

    const node = e.target.closest(".node");
    if (!node) return;

    const li = node.parentElement;

    if (li.classList.contains("has-children")) {
        li.classList.toggle("collapsed");
    }

});

function expandAll() {
    document.querySelectorAll("#tree li.has-children")
        .forEach(li => li.classList.remove("collapsed"));
}

function collapseAll() {
    document.querySelectorAll("#tree li.has-children")
        .forEach(li => li.classList.add("collapsed"));
}

/* =============================
   ZOEKEN
============================= */

function searchInDSM() {
    const query = document.getElementById("searchBox").value.toLowerCase();
    const resultBox = document.getElementById("searchResults");

    if (!query) {
        resultBox.style.display = "none";
        return;
    }

    const matches = window.DATASET.filter(item =>
        item.code.toLowerCase().includes(query) ||
        item.terms[0].toLowerCase().includes(query)
    );

    let html = "<ul>";
    matches.forEach(m => {
        html += `<li class="search-item" onclick="jumpToDSM('${m.code}')">
                    ${m.code} – ${m.terms[0]}
                 </li>`;
    });
    html += "</ul>";

    resultBox.innerHTML = html;
    resultBox.style.display = "block";
}

function jumpToDSM(code) {
    const target = document.getElementById("node-" + code);
    if (!target) return;

    let li = target.closest("li");
    while (li) {
        li.classList.remove("collapsed");
        li = li.parentElement.closest("li");
    }

    target.scrollIntoView({ behavior: "smooth", block: "center" });
}

/* =============================
   INIT
============================= */

const tree = buildTree(window.DATASET);
document.getElementById("tree").innerHTML = renderTree(tree);

</script>
