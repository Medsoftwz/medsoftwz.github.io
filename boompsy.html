<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Psychiatrie Boom</title>

<style>

body { font-family: Verdana, sans-serif; margin: 20px; font-size: 16px; }

h3 { text-align: center; color: #004080; }

#controls { text-align: center; margin-bottom: 15px; }
#controls button { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; margin: 4px; }
#controls button { font-family: Verdana, sans-serif; font-weight: 100; }
#controls button:first-of-type { background-color: #40FF40; color: #0000C0; }
#controls button:last-of-type { background-color: #0000C0;  color: white; }

#fileInput { padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 6px; }

#tree {
    margin-top: 20px;
    padding: 20px;
    border: 2px dashed #cbd5e1;
    border-radius: 8px;
    background-color: #f8fafc;
}

ul { list-style-type: none; padding-left: 20px; margin: 0; }
li { margin: 0; line-height: 1.2; }
li { margin: 2px 0; }
#tree li.collapsed > ul { display: none; }

.node { display: inline-block; line-height: 1.3; padding: 2px 4px; }
.node:hover { background-color: #FFFF00; }

.arrow { display: inline-block; width: 14px; margin-right: 4px; }
.arrow::before { content: " "; }

.has-children > .node .arrow::before { content: "▼"; }
.collapsed.has-children > .node .arrow::before { content: "▶"; }

.level-1 { color: #003366; }
.level-2 { font-family: Trebuchet MS, sans-serif; font-size: 17px; color: #008800; }
.level-3 { font-family: Dancing Script, cursive; font-size: 16px;color: #aa5500; }
.level-4 { color: #808080; font-style: italic; }

#search-container { text-align: center; margin-bottom: 10px; }
#search-container input { font-size: 16px; padding: 6px; color: #003366; }
#searchResults {
    display: none;
    background: #fff8dc;
    border: 1px solid #ccc;
    padding: 10px;
    margin-bottom: 15px;
    max-height: 300px;
    overflow: auto; }
.search-item { cursor: pointer; padding: 4px; text-decoration: underline; color: #004080; font-size: 14px; }
.search-item:hover { background-color: #e6f0ff; }

</style>
</head>

<body>

<h3> Psychiatrie Boom</h3>

<div id="controls">
    <input type="file" id="fileInput" accept=".js">
    <br><br>
    <button onclick="expandAll()">➕ Alles uitklappen</button>
    <button onclick="collapseAll()">➖ Alles inklappen</button>
</div>

<div id="search-container">
    <input type="text"
           id="searchBox"
           placeholder="Zoek code of term..."
           oninput="searchInDSM()"
           style="padding:6px; width:280px;">
</div>

<div id="searchResults"></div>

<div id="tree">Kies het 'boompsy.js' bestand</div>

<script>

/* =============================
   HULPFUNCTIES
============================= */

function getLevel(code) {
    return code.split(".").length;
}

function parseCode(code) {
    return code.replace("D", "")
        .split(/[_\.]/)
        .map(n => parseInt(n, 10));
}

function sortCodes(a, b) {
    const pa = parseCode(a.code);
    const pb = parseCode(b.code);

    for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
        const da = pa[i] ?? 0;
        const db = pb[i] ?? 0;
        if (da !== db) return da - db;
    }
    return 0;
}

/* =============================
   BOOM BOUWEN
============================= */

function buildTree(data) {
    const lookup = {};
    const root = [];

    data.sort(sortCodes);

    data.forEach(item => {
        lookup[item.code] = { ...item, children: [] };
    });

    data.forEach(item => {
        const parentCode = item.code.includes(".")
            ? item.code.split(".").slice(0, -1).join(".")
            : null;

        if (parentCode && lookup[parentCode]) {
            lookup[parentCode].children.push(lookup[item.code]);
        } else {
            root.push(lookup[item.code]);
        }
    });

    return root;
}

/* =============================
   RENDEREN MET ID STRUCTUUR
============================= */

function renderTree(nodes) {
    let html = "<ul>";

    nodes.forEach(node => {
        const level = getLevel(node.code);
        const hasChildren = node.children.length > 0;

        html += `
        <li class="${hasChildren ? "collapsed has-children" : ""}">
            <div class="node level-${level}"
                 id="node-${node.code}">
                <span class="arrow"></span>
                ${node.code} – ${node.terms[0]}
            </div>
        `;

        if (hasChildren) {
            html += renderTree(node.children);
        }

        html += "</li>";
    });

    html += "</ul>";
    return html;
}

/* =============================
   INTERACTIE
============================= */

document.getElementById("tree").addEventListener("click", function(e) {
    const node = e.target.closest(".node");
    if (!node) return;

    const li = node.parentElement;
    if (!li.classList.contains("has-children")) return;

    li.classList.toggle("collapsed");
});

function expandAll() {
    document.querySelectorAll("#tree li.has-children")
        .forEach(li => li.classList.remove("collapsed"));
}

function collapseAll() {
    document.querySelectorAll("#tree li.has-children")
        .forEach(li => li.classList.add("collapsed"));
}

/* =============================
   ZOEKEN
============================= */

function searchInDSM() {

    const query = document.getElementById("searchBox")
        .value.toLowerCase().trim();

    const resultBox = document.getElementById("searchResults");

    if (!query || !window.DATASET) {
        resultBox.style.display = "none";
        resultBox.innerHTML = "";
        return;
    }

    const matches = window.DATASET.filter(item => {
        const code = item.code.toLowerCase();
        const term = item.terms[0].toLowerCase();
        return code.includes(query) || term.includes(query);
    });

    if (matches.length === 0) {
        resultBox.innerHTML = "<i>Geen resultaten gevonden.</i>";
    } else {

        let html = "<b>Zoekresultaten (" + matches.length + ")</b><ul>";

        matches.forEach(m => {
            html += `
            <li class="search-item"
                onclick="jumpToDSM('${m.code}')">
                <b>${m.code}</b> – ${m.terms[0]}
            </li>`;
        });

        html += "</ul>";
        resultBox.innerHTML = html;
    }

    resultBox.style.display = "block";
}

/* =============================
   SPRING NAAR NODE
============================= */

function jumpToDSM(code) {

    const target = document.getElementById("node-" + code);
    if (!target) return;

    let li = target.closest("li");

    while (li) {
        li.classList.remove("collapsed");
        li = li.parentElement.closest("li");
    }

    target.scrollIntoView({ behavior: "smooth", block: "center" });

    target.style.backgroundColor = "#ffe066";
    setTimeout(() => {
        target.style.backgroundColor = "";
    }, 1500);
}

/* =============================
   BESTAND LADEN
============================= */

document.getElementById("fileInput").addEventListener("change", function () {

    const file = this.files[0];
    if (!file) return;

    delete window.DATASET;

    const script = document.createElement("script");
    script.src = URL.createObjectURL(file);

script.onload = function () {
    URL.revokeObjectURL(script.src);

    if (!Array.isArray(window.DATASET)) {
        document.getElementById("tree").innerHTML =
            "Fout: gekozen bestand bevat geen window.DATASET.";
        return;
    }

    const tree = buildTree(window.DATASET);
    document.getElementById("tree").innerHTML = renderTree(tree);

    // 👉 automatisch scrollen naar de boom
    document.getElementById("tree")
        .scrollIntoView({ behavior: "smooth", block: "start" });
};

    document.body.appendChild(script);
});

</script>
</body>
</html>
