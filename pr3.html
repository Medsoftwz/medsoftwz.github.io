<script>

function openTab(evt, tabName) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tablink').forEach(b => b.classList.remove('active'));
  document.getElementById(tabName).classList.add('active');
  evt.currentTarget.classList.add('active');

  // Scroll bij openen nieuwe tab
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function calculateSection(formId,resultId){
  const form=document.getElementById(formId);
  const questions=form.querySelectorAll('.question');
  let score=0, maxScore=0;

  for(const q of questions){
    const checked=q.querySelector('input[type="radio"]:checked');
    if(!checked){ alert('Beantwoord alle vragen in deze sectie.'); return; }
    score += parseInt(checked.value);
    const radios=q.querySelectorAll('input[type="radio"]');
    let max=0; radios.forEach(r=>{ const v=parseInt(r.value); if(v>max) max=v; });
    maxScore += max;
  }

  const pct = (score / maxScore) * 100;
  document.getElementById(resultId).innerText = `Sectiescore: ${score} / ${maxScore}
Functiedaling: ${pct.toFixed(1)} %`;
  document.getElementById(resultId).scrollIntoView({behavior:'smooth'});
}

function calculateTotal(){
  const allQuestions = document.querySelectorAll('.question');
  const allChecked = document.querySelectorAll('input[type="radio"]:checked');
  if(allChecked.length < allQuestions.length){
    alert('Gelieve alle vragen te beantwoorden vooraleer het totaal te berekenen.');
    return;
  }

  let totalScore = 0, maxScore = 0;

  allQuestions.forEach(q => {
    const checked = q.querySelector('input[type="radio"]:checked');
    totalScore += parseInt(checked.value);

    const radios = q.querySelectorAll('input[type="radio"]');
    let max = 0;
    radios.forEach(r => {
      const v = parseInt(r.value);
      if(v > max) max = v;
    });
    maxScore += max;
  });

  const pct = ((totalScore / maxScore) * 100).toFixed(1);
  const t = parseFloat(pct);

  // Interpretatie + kleurklasse
  let feedback = '';
  let cssClass = '';

  if(t < 20) {
    feedback = 'Weinig tot geen klachten';
    cssClass = 'interpret-green';
  } 
  else if(t < 40) {
    feedback = 'Lichte klachten - Medicijnen OK ?';
    cssClass = 'interpret-yellow';
  }
  else if(t < 60) {
    feedback = 'Matige klachten - Silodosine als medicatie ?';
    cssClass = 'interpret-orange';
  }
  else if(t < 80) {
    feedback = 'Ernstige klachten - Silodosine en NSAI medicatie gewenst ?';
    cssClass = 'interpret-red';
  }
  else {
    feedback = 'Zeer ernstige klachten - Silodosine en NSAI medicatie gewenst ?';
    cssClass = 'interpret-darkred';
  }

  // Output in kleur
document.getElementById('totalResult').innerText =
`Totale score: ${totalScore} / ${maxScore}
Functieverlies: ${pct} %
Interpretatie: ${feedback}`;

  document.getElementById('totalResult').scrollIntoView({behavior:'smooth'});
}

// =======================================================
// Hulpfunctie: wrap text op max. 70 tekens, met insprong
// =======================================================
function wrapText(str, maxWidth = 70) {
  const words = str.split(" ");
  let lines = [];
  let currentLine = "";

  words.forEach(word => {
    if ((currentLine + word).length > maxWidth) {
      lines.push(currentLine.trim());
      currentLine = word + " ";
    } else {
      currentLine += word + " ";
    }
  });

  if (currentLine.trim() !== "") {
    lines.push(currentLine.trim());
  }

  // 2e+ lijnen inspringen met 12 spaties
  return lines.join("\n            ");
}

// =======================================================
// Professioneel geformatteerde TXT-export
// =======================================================
function downloadTxt(){

  const allQuestions = document.querySelectorAll('.question');
  const allChecked   = document.querySelectorAll('.question input[type="radio"]:checked');

  if (allChecked.length < allQuestions.length){
    alert('Gelieve alle vragen te beantwoorden.');
    return;
  }

  const now = new Date();
  const timestamp = `${now.toLocaleDateString('nl-BE')} ${now.toLocaleTimeString('nl-BE')}`;

  /* ===============================
     Extra velden
     =============================== */
  let consultDate = "";
  let patientName = "";
  let patientRR   = "";

  if (document.getElementById('toggleExtraFields').checked) {
    consultDate = document.getElementById('consultDate').value.trim();
    patientName = document.getElementById('patientName').value.trim();
    patientRR   = document.getElementById('patientRR').value.trim();
  }

  /* ===============================
     Voorbereiding
     =============================== */
  let totalScore = 0;
  let maxScore   = 0;
  let answers    = "";
  let qCounter   = 0;

  const tabs     = Array.from(document.querySelectorAll('.tablink'));
  const sections = Array.from(document.querySelectorAll('.tab-content'));

  /* ===============================
     Doorloop secties automatisch
     =============================== */
  sections.forEach((section, idx) => {

    const questions = section.querySelectorAll('.question');
    if (questions.length === 0) return;

    const sectionTitle = tabs[idx]
      ? tabs[idx].innerText.trim()
      : `SECTIE ${idx + 1}`;

    answers += "----------------------------------------\n";
    answers += wrapText(sectionTitle) + "\n";
    answers += "----------------------------------------\n";

    questions.forEach(q => {

      const label   = q.querySelector('label').innerText;
      const checked = q.querySelector('input[type="radio"]:checked');
      const radios  = q.querySelectorAll('input[type="radio"]');

      let max = 0;
      radios.forEach(r => {
        const v = parseInt(r.value);
        if (v > max) max = v;
      });

      totalScore += parseInt(checked.value);
      maxScore   += max;

      qCounter++;

      const choiceText = checked.parentElement.innerText.trim();
      const line = `${qCounter}. ${label}: ${choiceText} (waarde ${checked.value})`;

      answers += wrapText(line) + "\n";
    });

    answers += "\n";
  });

  /* ===============================
     Interpretatie
     =============================== */
  const pct = ((totalScore / maxScore) * 100).toFixed(1);
  const t   = parseFloat(pct);

  let feedback = "";
  if      (t < 20) feedback = "Weinig tot geen klachten";
  else if (t < 40) feedback = "Lichte klachten - Medicijnen OK ?";
  else if (t < 60) feedback = "Matige klachten - Silodosine als medicatie ?";
  else if (t < 80) feedback = "Ernstige klachten - Silodosine en NSAI gewenst ?";
  else             feedback = "Zeer ernstige klachten - Silodosine en NSAI aangewezen ?";

  /* ===============================
     Opbouw TXT
     =============================== */
  let content = "";

  content += "========================================\n";
  content += "RAPPORT BIJWERKINGEN – PROSTAATTHERAPIE\n";
  content += "========================================\n\n";

  content += `Datum export: ${timestamp}\n`;
  if (consultDate) content += `Consultdatum: ${consultDate}\n`;
  if (patientName) content += `Patiënt: ${patientName}\n`;
  if (patientRR)   content += `Geboortedatum: ${patientRR}\n`;

  content += "\n----------------------------------------\n";
content += "TOTAALRESULTAAT\n";
content += "----------------------------------------\n";
content += `Totale score: ${totalScore} / ${maxScore}\n`;
content += `Functieverlies: ${pct} %\n`;
content += `Interpretatie: ${feedback}\n\n`;

  content += answers;

  /* ===============================
     Download
     =============================== */
  const blob = new Blob([content], { type: 'text/plain' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `bijwerkingen prostaattherapie ${now.toISOString().slice(0,10)}.txt`;
  link.click();
}


function toggleExtraFields() {
  const block = document.getElementById('extraFields');
  const chk = document.getElementById('toggleExtraFields');

  if (chk.checked) {
    block.style.display = "block";

    // automatische datum dd/mm/yyyy
    const now = new Date();
    const d = String(now.getDate()).padStart(2,'0');
    const m = String(now.getMonth()+1).padStart(2,'0');
    const y = now.getFullYear();
    document.getElementById('consultDate').value = `${d}/${m}/${y}`;
  } else {
    block.style.display = "none";
  }
}

// EXTRA TOE: automatisch openen bij pagina laden wanneer default aangevinkt is
window.addEventListener('DOMContentLoaded', () => {
  if (document.getElementById('toggleExtraFields').checked) {
    toggleExtraFields();
  }
});

// =======================================================
// Functie opent automatisch de volgende tab/sectie
// =======================================================
function openNextSection(currentForm) {
  const tabs = Array.from(document.querySelectorAll('.tablink'));

  const mapping = {
    'form1wz': '2wz',
    'form2wz': '3wz',
    'form3wz': '4wz',
    'form4wz': '5wz'
  };

  const nextTabId = mapping[currentForm.id];
  if (!nextTabId) return;

  const btn = tabs.find(b => b.getAttribute('onclick').includes(nextTabId));
  if (btn) {
    btn.click();
    setTimeout(() => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 300);
  }
}

// =======================================================
// Check: zijn ALLE vragen beantwoord?
// =======================================================
function allQuestionsAnswered() {
  const totalQuestions = document.querySelectorAll('.question').length;
  const checked = document.querySelectorAll('.question input[type="radio"]:checked').length;
  return checked === totalQuestions;
}

// =======================================================
// Automatisch totaalscore tonen zodra alles is ingevuld
// =======================================================
function autoShowTotalScore() {
  const btn = document.querySelector('button[onclick="calculateTotal()"]');
  if (!btn) return;

  // eerst naar de knop scrollen
  btn.scrollIntoView({ behavior: 'smooth', block: 'center' });

  // daarna automatisch klikken
  setTimeout(() => {
    btn.click();

    // tenslotte naar de resultatensectie scrollen
    setTimeout(() => {
      const resultBox = document.getElementById('totalResult');
      if (resultBox) {
        resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 300);

  }, 400);
}

// =======================================================
// AUTO SCROLL MET DELAY
// =======================================================
document.addEventListener('change', function(e) {

  if (!e.target.matches('.question input[type="radio"]')) return;

  const selectedRadio = e.target;
  const questionDiv = selectedRadio.closest('.question');
  const form = selectedRadio.closest('form');

  const allQuestions = Array.from(form.querySelectorAll('.question'));
  const idx = allQuestions.indexOf(questionDiv);

  // ===================================================
  // 🎯 DYNAMISCHE DELAY
  // ===================================================
  let delay;

  if (idx < 2) {
    delay = 1000; // eerste 2 vragen → traag
  } else if (idx < 4) {
    delay = 600; // midden → normaal
  } else {
    delay = 500;  // later → snel
  }

  // 👉 totaal check
  if (allQuestionsAnswered()) {
    autoShowTotalScore();
  }

  // 👉 scroll met delay
  setTimeout(() => {

    if (idx < allQuestions.length - 1) {

      const nextQuestion = allQuestions[idx + 1];
      nextQuestion.scrollIntoView({
        behavior: 'smooth',
        block: 'start'
      });

    } else {

      const calcButton = form.querySelector('.calc');

      if (calcButton) {
        calcButton.scrollIntoView({
          behavior: 'smooth',
          block: 'center'
        });
      }

      openNextSection(form);
    }

  }, delay);

});

function buildPrintReport() {

  if (!allQuestionsAnswered()) {alert('Gelieve alle vragen te beantwoorden.'); return;}

  const report = document.getElementById("printReport");
  report.innerHTML = "";

  const patient = document.getElementById('patientName')?.value || "";
  const rrn     = document.getElementById('patientRR')?.value || "";
  const consult = document.getElementById('consultDate')?.value || "";

  report.innerHTML += `
    <h2>Rapport bijwerkingen – Prostaattherapie</h2>
    <p>
      Patiënt: <strong>${patient}</strong><br>
      Geboortedatum:<strong>${rrn}</strong><br>
      Consultdatum: <strong>${consult}</strong>
    </p>
    <hr>
	
	<h3>Evaluatie</h3>
	<div class="summary-box">
	<p class="summary-text" style="white-space: pre-line;">${document.getElementById('totalResult').innerText}</p>
	</div>
`;

  let qnr = 0;

  document.querySelectorAll('.tab-content').forEach(section => {

    const questions = section.querySelectorAll('.question');
    if (questions.length === 0) return;

    const tabId = section.id;
    const tabBtn = Array.from(document.querySelectorAll('.tablink'))
      .find(b => b.getAttribute('onclick')?.includes(tabId));
    const title = tabBtn ? tabBtn.innerText : "";

    // report.innerHTML += `<div class="print-section"><h3>${title}</h3>`; 
	report.innerHTML += `<div class="print-section">`;

    questions.forEach(q => {
      qnr++;
      const label = q.querySelector('label').innerText;
      const checked = q.querySelector('input[type="radio"]:checked');

	  const value = checked.value;
	  const answer = `${checked.parentElement.innerText.trim()} (${value})`;


      report.innerHTML += `
        <div class="print-question">
          <strong>${qnr}. ${label}</strong>
          <div class="print-answer">${answer}</div>
        </div>
      `;
    });

    report.innerHTML += `</div>`;
  });
}

// =======================================================
// PRINT / PDF – bestandsnaam
// =======================================================
function setPdfTitle() {

  const name = document.getElementById('patientName')?.value || "";
  const date = document.getElementById('consultDate')?.value || "";

  let code = name.replace(/[^a-zA-Z]/g, '')
                 .toUpperCase()
                 .substring(0, 4);

  if (code.length < 4) code = code.padEnd(4, 'X');

  let isoDate = date;
  if (date.includes('/')) {
    const [d, m, y] = date.split('/');
    isoDate = `${y}-${m}-${d}`;
  }

  document.title = `Prostaat ${code} ${isoDate}`;
}
